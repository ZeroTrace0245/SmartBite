api-version: 2024-02-02-preview
location: {{ .Env.AZURE_LOCATION }}
identity:
  type: UserAssigned
  userAssignedIdentities:
    ? "{{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}"
    : {}
properties:
  environmentId: {{ .Env.AZURE_CONTAINER_APPS_ENVIRONMENT_ID }}
  configuration:
    activeRevisionsMode: single
    runtime:
      dotnet:
        autoConfigureDataProtection: true
    ingress:
      external: false
      targetPort: {{ targetPortOrDefault 8080 }}
      transport: http
      allowInsecure: true
    registries:
      - server: {{ .Env.AZURE_CONTAINER_REGISTRY_ENDPOINT }}
        identity: {{ .Env.AZURE_CONTAINER_REGISTRY_MANAGED_IDENTITY_ID }}
    secrets:
      - name: cache-password
        value: '{{ securedParameter "cache_password" }}'
      - name: chatmodel-key
        value: '{{ securedParameter "chatModel_gh_apikey" }}'
      - name: connectionstrings--cache
        value: cache:6379,password={{ securedParameter "cache_password" }}
      - name: connectionstrings--chatmodel
        value: Endpoint=https://models.github.ai/inference;Key={{ securedParameter "chatModel_gh_apikey" }};Model=gpt-4o-mini
      - name: connectionstrings--smartbitedb
        value: Host=postgres;Port=5432;Username=postgres;Password={{ securedParameter "postgres_password" }};Database=smartbitedb
      - name: smartbitedb-password
        value: '{{ securedParameter "postgres_password" }}'
  template:
    containers:
      - image: {{ .Image }}
        name: apiservice
        env:
          - name: AZURE_CLIENT_ID
            value: {{ .Env.MANAGED_IDENTITY_CLIENT_ID }}
          - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
            value: "true"
          - name: CACHE_HOST
            value: cache
          - name: CACHE_PORT
            value: "6379"
          - name: CACHE_URI
            value: redis://:{{ uriEncode (securedParameter "cache_password" )}}@cache:6379
          - name: CHATMODEL_MODELNAME
            value: gpt-4o-mini
          - name: CHATMODEL_URI
            value: https://models.github.ai/inference
          - name: HTTP_PORTS
            value: '{{ targetPortOrDefault 0 }}'
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES
            value: "true"
          - name: OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY
            value: in_memory
          - name: SMARTBITEDB_DATABASENAME
            value: smartbitedb
          - name: SMARTBITEDB_HOST
            value: postgres
          - name: SMARTBITEDB_JDBCCONNECTIONSTRING
            value: jdbc:postgresql://postgres:5432/smartbitedb
          - name: SMARTBITEDB_PORT
            value: "5432"
          - name: SMARTBITEDB_URI
            value: postgresql://postgres:{{ uriEncode (securedParameter "postgres_password" )}}@postgres:5432/smartbitedb
          - name: SMARTBITEDB_USERNAME
            value: postgres
          - name: CACHE_PASSWORD
            secretRef: cache-password
          - name: CHATMODEL_KEY
            secretRef: chatmodel-key
          - name: ConnectionStrings__cache
            secretRef: connectionstrings--cache
          - name: ConnectionStrings__chatModel
            secretRef: connectionstrings--chatmodel
          - name: ConnectionStrings__smartbitedb
            secretRef: connectionstrings--smartbitedb
          - name: SMARTBITEDB_PASSWORD
            secretRef: smartbitedb-password
    scale:
      minReplicas: 1
tags:
  azd-service-name: apiservice
  aspire-resource-name: apiservice
